<!DOCTYPE html>
<html>
<head>
    <title>Student Placement Prediction</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 600px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4);
            color: white;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .subtitle {
            text-align: center;
            margin-bottom: 26px;
            color: #dbeafe;
            font-size: 14px;
        }

        label {
            font-size: 14px;
            margin-top: 10px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: none;
            font-size: 15px;
        }

        input:focus, select:focus {
            outline: none;
            box-shadow: 0 0 5px #00f2fe;
        }

        .btn-row {
            display: flex;
            gap: 12px;
        }

        .btn-row button {
            flex: 1;
            width: auto;
            white-space: nowrap;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(to right, #00f2fe, #4facfe);
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s ease;
        }

        button:hover {
            transform: scale(1.03);
            opacity: 0.9;
        }

        .btn-reset {
            background: linear-gradient(to right, #64748b, #475569);
        }

        .result-box {
            margin-top: 30px;
            padding: 20px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.15);
            text-align: center;
        }

        .placed {
            color: #00ff99;
            font-size: 20px;
        }

        .not-placed {
            color: #ff4d4d;
            font-size: 20px;
        }

        .progress-bar {
            height: 12px;
            background: #ddd;
            border-radius: 10px;
            margin-top: 10px;
            overflow: hidden;
        }

        .progress {
            height: 100%;
            background: linear-gradient(to right, #00f2fe, #4facfe);
        }

        @media (max-width: 650px) {
            .container {
                width: 95%;
                padding: 25px;
            }

            .btn-row {
                flex-direction: column;
            }

            .btn-row button {
                width: 100%;
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Placement Prediction System</h1>
    <div class="subtitle">Fill all fields clearly. Scores are out of 100 and result is shown in percentage.</div>

    <form method="post" action="/predict_form" id="prediction-form">

        <label>Gender</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male" {% if form_data.gender == "Male" %}selected{% endif %}>Male</option>
            <option value="Female" {% if form_data.gender == "Female" %}selected{% endif %}>Female</option>
        </select>

        <label>CGPA (0 to 10)</label>
        <input type="number" step="0.01" min="0" max="10" name="cgpa" value="{{ form_data.cgpa | default('') }}" required>

        <label>Number of Internships Completed</label>
        <input type="number" min="0" name="internships" value="{{ form_data.internships | default('') }}" required>

        <label>Aptitude Score (out of 100)</label>
        <input type="number" min="0" max="100" name="aptitude_score" value="{{ form_data.aptitude_score | default('') }}" required>

        <label>Communication Score (out of 100)</label>
        <input type="number" min="0" max="100" name="communication_score" value="{{ form_data.communication_score | default('') }}" required>

        <label>Number of Academic/Personal Projects</label>
        <input type="number" min="0" name="projects" value="{{ form_data.projects | default('') }}" required>

        <label>Branch</label>
        <select name="branch" required>
            <option value="">Select Branch</option>
            <option value="BSc CS" {% if form_data.branch == "BSc CS" %}selected{% endif %}>BSc CS</option>
            <option value="BSc Data Science" {% if form_data.branch == "BSc Data Science" %}selected{% endif %}>BSc Data Science</option>
            <option value="BSc AI" {% if form_data.branch == "BSc AI" %}selected{% endif %}>BSc AI</option>
            <option value="BBA" {% if form_data.branch == "BBA" %}selected{% endif %}>BBA</option>
            <option value="BCA" {% if form_data.branch == "BCA" %}selected{% endif %}>BCA</option>
            <option value="BCA Data Science" {% if form_data.branch == "BCA Data Science" %}selected{% endif %}>BCA Data Science</option>
            <option value="BCom" {% if form_data.branch == "BCom" %}selected{% endif %}>BCom</option>
        </select>

        <label>Current Backlogs</label>
        <input type="number" min="0" name="backlogs" value="{{ form_data.backlogs | default('') }}" required>

        <div class="btn-row">
            <button type="submit">Submit & Predict</button>
            <button type="button" id="reset-btn" class="btn-reset" onclick="window.location.href='/reset'">Reset Form</button>
        </div>
    </form>

    {% if prediction is defined %}
    <div class="result-box">
        {% if prediction == 1 %}
            <div class="placed">Likely to be Placed</div>
        {% else %}
            <div class="not-placed">Risk of Not Being Placed</div>
        {% endif %}

        <div style="margin-top: 10px;">
            Confidence: {{ probability_percent }}%
        </div>

        <div class="progress-bar">
            <div class="progress" style="width: {{ probability_percent }}%;"></div>
        </div>
    </div>
    {% endif %}
</div>

<script>
    const form = document.getElementById("prediction-form");
    const resetBtn = document.getElementById("reset-btn");
    const storageKey = "placement_form_data";
    const navEntry = performance.getEntriesByType("navigation")[0];

    // On Ctrl+R / browser reload, reset both browser and server-side state.
    if (navEntry && navEntry.type === "reload") {
        localStorage.removeItem(storageKey);
        window.location.replace("/reset");
    }

    function saveFormData() {
        const data = {};
        new FormData(form).forEach((value, key) => {
            data[key] = value;
        });
        localStorage.setItem(storageKey, JSON.stringify(data));
    }

    function restoreFormData() {
        const raw = localStorage.getItem(storageKey);
        if (!raw) return;

        try {
            const data = JSON.parse(raw);
            Object.keys(data).forEach((key) => {
                const field = form.elements.namedItem(key);
                if (field) field.value = data[key];
            });
        } catch (_) {
            localStorage.removeItem(storageKey);
        }
    }

    restoreFormData();
    form.addEventListener("input", saveFormData);
    form.addEventListener("change", saveFormData);
    resetBtn.addEventListener("click", () => localStorage.removeItem(storageKey));
</script>

</body>
</html>
